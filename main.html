<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BlockWorld</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">

    <aside class="sidebar">
      <div class="logo">BLOCKWORLD</div>
      <nav>
        <a href="#">Home</a>
        <a href="#">Games</a>
        <a href="#">Friends</a>
        <a href="#">Avatar Shop</a>
        <a href="#">Messages</a>
      </nav>
    </aside>

    <main class="main-content">
      <header>
        <input type="text" id="search" placeholder="Search games..." />
        <div class="profile">
          <img src="https://via.placeholder.com/40" alt="Profile" />
          <span>PlayerOne</span>
        </div>
      </header>

      <section class="hero">
        <h1>Discover New Worlds</h1>
        <p>Play millions of user-created games.</p>
      </section>

      <section class="games-section">
        <h2>Popular Games</h2>
        <div class="games-grid" id="gamesGrid"></div>
      </section>
    </main>

    <aside class="friends-panel">
      <h3>Friends Online</h3>
      <ul>
        <li>BuilderPro</li>
        <li>NoobDestroyer</li>
        <li>PixelKing</li>
      </ul>
    </aside>

  </div>

  <script src="app.js"></script>
</body>
</html>
